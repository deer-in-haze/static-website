<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>ASTRAEUS | Space Glossary</title>

  <meta name="description" content="A searchable glossary of astronomy and space exploration terms. Look up definitions for orbital mechanics, celestial navigation, physics phenomena and more.">
  <meta name="keywords" content="astronomy glossary, space terms, astronomy definitions, orbital mechanics, celestial navigation, astrophysics, space dictionary">
  <meta name="author" content="Miglė Lukoševičiūtė">
  <meta name="robots" content="index, follow">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="ASTRAEUS | Space Glossary">
  <meta property="og:description" content="Search and filter definitions for key astronomy and space exploration terms.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navbar injected by main.js from partials/navbar.html -->
  <nav id="navbar" class="navbar navbar-expand-lg fixed-top"></nav>

  <!-- GLOSSARY: searchable, filterable term cards -->
  <main class="py-5">
    <div class="container">

      <h1 class="mb-4">Space Glossary</h1>

      <!-- Search input and category filter buttons -->
      <div class="glossary-controls">

        <!-- Live search — filters terms as you type (handled in glossary.js) -->
        <div class="glossary-search-wrap">
          <input
            type="search"
            id="glossary-search"
            placeholder="Search terms or definitions…"
            aria-label="Search glossary"
          >
        </div>

        <!-- Category filter buttons — click to narrow by topic -->
        <div class="glossary-filters">
          <button class="glossary-filter-btn active" data-category="all">All</button>
          <button class="glossary-filter-btn" data-category="orbital">Orbital</button>
          <button class="glossary-filter-btn" data-category="navigation">Navigation</button>
          <button class="glossary-filter-btn" data-category="measurement">Measurement</button>
          <button class="glossary-filter-btn" data-category="physics">Physics</button>
          <button class="glossary-filter-btn" data-category="objects">Objects</button>

          <!-- Result count updated by glossary.js -->
          <span class="glossary-count" id="glossary-count"></span>
        </div>

      </div>

      <!-- Term cards injected here by glossary.js -->
      <div class="glossary-grid" id="glossary-grid"></div>

    </div>
  </main>

  <!-- Footer injected by main.js from partials/footer.html -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Shared utilities -->
  <script src="./js/api.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/helper.js"></script>

  <!-- Page-specific: term data, search and filter logic -->
  <script src="./js/glossary.js"></script>

  <!-- Page bootstrap: loads navbar and footer partials -->
  <script src="./js/main.js"></script>

</body>
</html>
