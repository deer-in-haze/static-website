<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>ASTRAEUS | Planetarium (VirtualSky)</title>

  <meta name="description" content="Explore the night sky in real time with the ASTRAEUS interactive planetarium powered by VirtualSky. View stars, constellations, planets and deep-sky objects from any location on Earth.">
  <meta name="keywords" content="planetarium, VirtualSky, interactive sky map, constellations, stars, planets, astronomy, night sky, space exploration">
  <meta name="author" content="Miglė Lukoševičiūtė">
  <meta name="robots" content="index, follow">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="ASTRAEUS | Planetarium (VirtualSky)">
  <meta property="og:description" content="Interactive browser-based planetarium showing the real-time night sky from your location.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Skip link: visible on keyboard focus, jumps past the navbar -->
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- Navbar injected by main.js from partials/navbar.html -->
  <nav id="navbar" class="navbar navbar-expand-lg fixed-top"></nav>

  <main id="main">
    <!-- VirtualSky iframe — stereo projection with live tracking, lazy-loaded -->
    <iframe
      id="sky"
      src="https://slowe.github.io/VirtualSky/embed.html?projection=stereo&constellations=true&constellationlabels=true&showplanets=true&showplanetlabels=true&cardinalpoints=true&live=true"
      loading="lazy">
    </iframe>

    <h2 class="centeredTitle">VirtualSky</h2>
  </main>

  <!-- Footer injected by main.js from partials/footer.html -->
  <div id="footer"></div>

  <!-- Bootstrap JS (required for modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Shared utilities: API URL builder, geolocation, helpers -->
  <script src="./js/api.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/helper.js"></script>

  <!-- Calendar feature scripts (needed for navbar/footer partial loading) -->
  <script src="./js/google_calendar.js"></script>
  <script src="./js/calendar_event_modal.js"></script>
  <script src="./js/calendar.js"></script>

  <!-- Page bootstrap: loads partials -->
  <script src="./js/main.js"></script>

</body>
</html>
