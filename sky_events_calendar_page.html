<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>ASTRAEUS | Sky Events Calendar</title>

  <meta name="description" content="Explore upcoming astronomical events with the ASTRAEUS Sky Events Calendar. View lunar eclipses, meteor showers and planetary alignments.">
  <meta name="keywords" content="sky events, astronomy calendar, lunar eclipse, meteor shower, planet alignment, space events, astronomy website">
  <meta name="author" content="Miglė Lukoševičiūtė">
  <meta name="robots" content="index, follow">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="ASTRAEUS | Sky Events Calendar">
  <meta property="og:description" content="Monthly astronomical events calendar with detailed space observations.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Skip link: visible on keyboard focus, jumps past the navbar -->
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- Navbar injected by main.js from partials/navbar.html -->
  <nav id="navbar" class="navbar navbar-expand-lg fixed-top"></nav>

  <!-- Calendar grid injected by main.js from partials/calendar.html -->
  <main id="main">
    <div id="calendar" class="py-5"></div>
  </main>

  <!-- Footer injected by main.js from partials/footer.html -->
  <div id="footer"></div>

  <!-- Bootstrap JS (required for modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Shared utilities: API URL builder, geolocation, helpers -->
  <script src="./js/api.js"></script>
  <script src="./js/user.js"></script>
  <script src="./js/helper.js"></script>

  <!-- Calendar feature: Google Calendar link builder, modal, grid -->
  <script src="./js/google_calendar.js"></script>
  <script src="./js/calendar_event_modal.js"></script>
  <script src="./js/calendar.js"></script>

  <!-- Page bootstrap: loads partials then calls init_calendar() -->
  <script src="./js/main.js"></script>

</body>
</html>
